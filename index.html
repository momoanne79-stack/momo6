<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>수리나무학원 문법 언스크램블 Unit 29-31</title>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
<style>
:root{--main:#1a5c9a;--main2:#0d365e;--accent:#f5a623;--bg:#f3f8ff;--soft:#eef7ff;--line:#d5e7f8;--text:#142133;--muted:#60758a;--green:#22a06b;--red:#e5534b;--shadow:0 12px 36px rgba(26,92,154,.16)}
*{box-sizing:border-box}
body{margin:0;padding:14px;background:var(--bg);color:var(--text);font-family:'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif}
#app{max-width:560px;margin:0 auto;background:#fff;border-radius:24px;overflow:hidden;box-shadow:var(--shadow);min-height:calc(100vh - 28px)}
.header{background:linear-gradient(135deg,var(--main),var(--main2));color:#fff;text-align:center;padding:24px 18px 17px;position:relative;overflow:hidden}
.header:before{content:'';position:absolute;right:-48px;top:-54px;width:145px;height:145px;border-radius:50%;background:rgba(255,255,255,.13)}
.header:after{content:'';position:absolute;left:-42px;bottom:-58px;width:125px;height:125px;border-radius:50%;background:rgba(245,166,35,.18)}
.label{display:inline-block;background:var(--accent);color:#432700;border-radius:999px;padding:5px 12px;font-weight:1000;font-size:12px;margin-bottom:8px;position:relative;z-index:1}
.header h1{font-size:22px;margin:4px 0 6px;letter-spacing:-.3px;position:relative;z-index:1}
.header p{margin:0;font-size:13px;font-weight:800;opacity:.92;line-height:1.5;position:relative;z-index:1}
.tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;background:#f7fbff;padding:10px;border-bottom:1px solid #e6eef8;position:sticky;top:0;z-index:10}
.tab{border:0;border-radius:13px;background:#e8f1fa;color:#24445f;min-height:50px;font-size:13px;font-weight:1000;cursor:pointer}
.tab.active{background:var(--main);color:#fff;box-shadow:0 4px 14px rgba(26,92,154,.25)}
.tab.pass::after{content:' ✓';color:#fff}
.tab.warn{background:#fff5e0;color:#7a5300}
.tab.warn.active{background:var(--accent);color:#432700}
.section{display:none;padding:16px}
.section.active{display:block;animation:fade .22s ease}
@keyframes fade{from{opacity:.35;transform:translateY(5px)}to{opacity:1;transform:none}}
.card{border:1.7px solid var(--line);border-radius:18px;padding:15px;background:#fff;margin-bottom:13px}
.soft{background:var(--soft)}
.unit-title{font-size:20px;color:var(--main);font-weight:1000;margin:0 0 7px}
.desc{font-size:14px;color:var(--muted);font-weight:800;line-height:1.58}
.status{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:11px;flex-wrap:wrap}
.badge{display:inline-block;background:#e8f1fa;color:#24445f;border-radius:999px;padding:8px 12px;font-size:13px;font-weight:1000}
.badge.green{background:#e8fff4;color:#11623d}
.badge.red{background:#fff0f0;color:#a2322e}
.badge.gold{background:#fff8e8;color:#7a5300}
.progress{height:13px;border-radius:999px;background:#dbeefa;overflow:hidden;margin-top:10px}
.bar{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--green));transition:.35s}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn{width:100%;border:0;border-radius:14px;min-height:52px;padding:13px 10px;font-size:16px;font-weight:1000;cursor:pointer;background:var(--main);color:#fff;margin-top:8px}
.btn.secondary{background:#e8f1fa;color:#24445f}
.btn.orange{background:var(--accent);color:#432700}
.btn.danger{background:var(--red);color:#fff}
.btn:active{transform:scale(.99)}
.btn[disabled]{opacity:.42;cursor:not-allowed}
.quiz-head{background:#f8fbff;border:1.7px solid #e3edf8;border-radius:17px;padding:14px;margin-bottom:11px}
.qno{font-size:14px;color:var(--main);font-weight:1000;margin-bottom:8px}
.ko{font-size:19px;line-height:1.6;font-weight:1000;color:#0e3758;background:#eef7ff;border-left:6px solid var(--main);border-radius:16px;padding:14px;margin-top:6px}
.hint{font-size:13px;color:#6a7f93;font-weight:800;line-height:1.55;margin-top:9px}
.answer,.bank{display:flex;flex-wrap:wrap;gap:9px;align-items:center;justify-content:center;border-radius:17px;padding:13px;min-height:82px;margin-bottom:11px}
.answer{border:2.5px dashed var(--main);background:#eef7ff}
.bank{border:2px solid #e7eff8;background:#f8fbff}
.chip{border:2px solid #b8d6ef;background:white;border-radius:12px;padding:12px 15px;font-weight:1000;font-size:16px;cursor:pointer;touch-action:manipulation;user-select:none;line-height:1.24;box-shadow:0 2px 8px rgba(26,92,154,.07)}
.chip:active{transform:translateY(1px);background:#f2f9ff}
.answer .chip{border-color:#7fb3df}
.sortable-ghost{opacity:.35}
.sortable-drag{background:var(--main)!important;color:#fff!important;box-shadow:0 8px 18px rgba(26,92,154,.25)!important}
.ok-pop{position:fixed;left:50%;top:38%;transform:translate(-50%,-50%);z-index:9999;background:#e8fff4;color:#11623d;border:2px solid var(--green);border-radius:999px;padding:10px 22px;font-size:25px;font-weight:1000;letter-spacing:.7px;box-shadow:0 10px 26px rgba(34,160,107,.24);pointer-events:none;animation:okFlash .85s ease-out forwards}
@keyframes okFlash{0%{opacity:0;transform:translate(-50%,-35%) scale(.7)}20%{opacity:1;transform:translate(-50%,-50%) scale(1.08)}70%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-65%) scale(.92)}}
.confetti{position:fixed;left:50%;top:38%;width:8px;height:8px;border-radius:2px;background:var(--accent);z-index:9998;pointer-events:none;animation:burst .75s ease-out forwards}
@keyframes burst{0%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(calc(-50% + var(--x)),calc(-50% + var(--y))) rotate(240deg) scale(.7)}}
.feedback{display:none;border-radius:15px;padding:14px;margin-top:11px;font-weight:1000;line-height:1.58}
.feedback.show{display:block}
.feedback.ok{background:#e8fff4;border:2px solid var(--green);color:#11623d}
.feedback.ng{background:#fff0f0;border:2px solid var(--red);color:#a2322e}
.next-panel{text-align:center}
.next-panel .ok-small{font-size:20px;color:#11623d;font-weight:1000;margin-bottom:4px}
.try-msg{font-size:14px;color:#a2322e;font-weight:1000}
.complete{display:none;text-align:center}
.complete.show{display:block}
.big-emoji{font-size:54px;line-height:1;margin:8px 0}
.score-big{font-size:36px;font-weight:1000;color:var(--main);margin:10px 0}
.record-grid{display:grid;gap:10px}
.record{display:flex;justify-content:space-between;gap:10px;align-items:center;background:#f8fbff;border:1.5px solid #e4eef8;border-radius:15px;padding:13px}
.record b{color:var(--main)}
.record small{color:var(--muted);font-weight:800}
.wrong-list{display:grid;gap:9px;margin-top:10px}
.wrong-item{border-left:5px solid var(--red);background:#fff7f7;border-radius:13px;padding:11px 12px;font-weight:900;line-height:1.48}
.wrong-item .en{font-family:Georgia,'Times New Roman',serif;color:#9c2d28;margin-top:4px}
.wrong-item .unit{color:var(--main);font-weight:1000;margin-bottom:3px}
.top-tools{display:flex;justify-content:space-between;gap:8px;align-items:center;margin-top:10px;flex-wrap:wrap}
.empty{background:#f8fbff;border:1.5px dashed #cbddeb;border-radius:14px;padding:15px;text-align:center;color:#60758a;font-weight:900;line-height:1.55}
.hidden{display:none!important}
.unit-list{display:grid;gap:12px}
.meta-line{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
@media(max-width:520px){.tabs{grid-template-columns:repeat(3,1fr)}body{padding:10px}.header h1{font-size:20px}.section{padding:13px}.btn-row{grid-template-columns:1fr}.chip{font-size:15px;padding:11px 13px}.tab{font-size:12px;min-height:46px}.ko{font-size:18px}.answer,.bank{min-height:76px}}
</style>
</head>

<script>
const UNITS = [{"id": "u29", "tab": "Unit29", "title": "Unit 29 접속사 and / but / or", "desc": "뜻을 보고 단어를 배열하며 and, but, or의 쓰임을 연습합니다.", "items": [{"sec": "A-1", "ko": "Liam은 요리하는 것을 좋아하지만 그의 아내는 그것을 좋아하지 않는다.", "en": "Liam likes cooking, but his wife doesn't like it."}, {"sec": "A-2", "ko": "Michael은 노래 부르는 것과 춤추는 것을 좋아한다.", "en": "Michael loves singing and dancing."}, {"sec": "A-3", "ko": "너는 외동이니, 아니면 형제자매가 있니?", "en": "Are you an only child or do you have siblings?"}, {"sec": "A-4", "ko": "나는 Kelly는 알지만 그녀의 여동생은 모른다.", "en": "I know Kelly, but I don't know her sister."}, {"sec": "A-5", "ko": "Leona는 배가 몹시 아파서 병원에 갔다.", "en": "Leona had a terrible stomachache and went to the hospital."}, {"sec": "A-6", "ko": "그는 열심히 연습했지만 TV 쇼 오디션에 떨어졌다.", "en": "He practiced hard but failed the audition for the TV show."}, {"sec": "B-1", "ko": "Adam은 춥고 배가 고팠다.", "en": "Adam was cold and hungry."}, {"sec": "B-2", "ko": "Matilda는 어리지만 매우 용감하다.", "en": "Matilda is young, but she is very brave."}, {"sec": "B-3", "ko": "너는 펜이나 연필 중 어느 것이 필요하니?", "en": "Which one do you need, a pen or a pencil?"}, {"sec": "B-4", "ko": "Taylor는 머리가 아프고 열이 났다.", "en": "Taylor had a headache and a fever."}, {"sec": "B-5", "ko": "그 학교는 꽤 오래됐지만 새로 칠해졌다.", "en": "The school is quite old, but newly painted."}, {"sec": "B-6", "ko": "내 집에서 나가세요. 그렇지 않으면 경찰을 부르겠어요.", "en": "Leave my house, or I'll call the police."}, {"sec": "C-1", "ko": "Tom은 최선을 다했지만, 그것을 끝마칠 수 없었다.", "en": "Tom did his best, but he couldn't finish it."}, {"sec": "C-2", "ko": "우리는 요트를 만들거나 차를 살 계획이었다.", "en": "We planned to build a sailboat or to buy a car."}, {"sec": "C-3", "ko": "그는 키가 크고 잘생겼으며 똑똑하다.", "en": "He is tall, handsome, and smart."}, {"sec": "C-4", "ko": "그가 그녀에게 꽃을 좀 보냈지만, 그녀는 그것을 받지 못했다.", "en": "He sent her some flowers, but she didn't get them."}, {"sec": "C-5", "ko": "Peter는 제주도에 가서 한라산을 올랐다.", "en": "Peter went to Jeju Island and climbed Mt. Halla."}]}, {"id": "u30", "tab": "Unit30", "title": "Unit 30 when / before / after", "desc": "시간 접속사 when, before, after가 들어간 문장을 단어 배열로 연습합니다.", "items": [{"sec": "A-1", "ko": "나는 배고파. 점심을 먹은 후에 쇼핑하러 갈 수 있을까?", "en": "I'm hungry. Can we go shopping after we have lunch?"}, {"sec": "A-2", "ko": "그녀는 너무 늦기 전에 그에게 사과해야 한다.", "en": "She should apologize to him before it's too late."}, {"sec": "A-3", "ko": "그녀가 시험에 합격하면 우리는 기쁠 것이다.", "en": "We'll be happy when she passes the exam."}, {"sec": "A-4", "ko": "지하철역에 도착하면 나에게 전화해 주세요.", "en": "Please call me when you get to the subway station."}, {"sec": "A-5", "ko": "그는 아침을 먹은 후에 개를 산책시킬 것이다.", "en": "He will walk his dog after he has breakfast."}, {"sec": "A-6", "ko": "나는 스트레스를 받을 때 긴 목욕을 한다.", "en": "I take a long bath when I feel stressed."}, {"sec": "A-7", "ko": "네가 휴가를 가기 전에 내가 저녁을 대접할게.", "en": "I'll treat you to dinner before you go on vacation."}, {"sec": "B-1", "ko": "네가 Emma를 보면 나 대신 인사해 줘.", "en": "Say hello to Emma for me when you see her."}, {"sec": "B-2", "ko": "병아리가 부화하기 전에 닭 수를 세지 마라.", "en": "Don't count your chickens before they are hatched."}, {"sec": "B-3", "ko": "Billy, 단 것을 먹은 후에 이를 닦아라.", "en": "Billy, brush your teeth after you eat something sweet."}, {"sec": "B-4", "ko": "그는 잠을 깨야 할 때 콜라를 마신다.", "en": "He drinks cola when he needs to wake up."}, {"sec": "B-5", "ko": "너는 슈퍼마켓이 닫기 전에 우유를 사야 한다.", "en": "You have to buy milk before the supermarket closes."}, {"sec": "B-6", "ko": "나는 잠을 잘 잔 후 훨씬 기분이 좋아졌다.", "en": "I felt much better after I slept well."}, {"sec": "B-7", "ko": "나는 이 에세이를 끝낸 후 휴대전화를 다시 켤 것이다.", "en": "I'll turn my cell phone back on after I finish this essay."}, {"sec": "C-1", "ko": "내가 그녀에게 전화했을 때, 그녀는 전화를 받지 않았다.", "en": "When I called her, she didn't answer the phone."}, {"sec": "C-2", "ko": "그녀는 식사를 끝낸 후에 설거지를 했다.", "en": "She did the dishes after she finished the meal."}, {"sec": "C-3", "ko": "Susan은 먹기 전에 손을 씻었다.", "en": "Susan washed her hands before she ate."}, {"sec": "C-4", "ko": "나는 네가 떠난 후에 네 텀블러를 찾았다.", "en": "I found your tumbler after you left."}, {"sec": "C-5", "ko": "내가 그 노래를 들었을 때, 네 생각이 났다.", "en": "When I listened to the song, I thought of you."}]}, {"id": "u31", "tab": "Unit31", "title": "Unit 31 if / that / because", "desc": "조건, 이유, 명사절 접속사 if, that, because를 단어 배열로 연습합니다.", "items": [{"sec": "A-1", "ko": "나는 라켓이 부러졌기 때문에 탁구를 칠 수 없다.", "en": "I can't play ping pong because my racket is broken."}, {"sec": "A-2", "ko": "요점은 우리가 돈이 충분하지 않다는 것이다.", "en": "The point is that we don't have enough money."}, {"sec": "A-3", "ko": "나는 그가 예의 바르다고 생각한다.", "en": "I think that he is polite."}, {"sec": "A-4", "ko": "Jones 선생님이 내년에 너를 가르치시면, 너는 그녀를 좋아할 것이다.", "en": "If Ms. Jones teaches you next year, you'll like her."}, {"sec": "A-5", "ko": "Tom은 학교 버스를 놓쳤기 때문에 늦었다.", "en": "Tom was late because he missed the school bus."}, {"sec": "A-6", "ko": "그녀가 너무 바쁘지 않다면 나를 보러 올 것이다.", "en": "She'll come to see me if she isn't too busy."}, {"sec": "A-7", "ko": "그가 시험에 떨어지면 다시 그 시험을 볼 것이다.", "en": "He'll take the test again if he fails it."}, {"sec": "B-1", "ko": "Tom은 이 신발이 그의 재킷과 잘 어울리기 때문에 좋아한다.", "en": "Tom likes these shoes because they go well with his jacket."}, {"sec": "B-2", "ko": "Bob은 인터넷에서 뉴스를 읽는 것이 쉽다고 생각한다.", "en": "Bob thinks that reading the news on the Internet is easy."}, {"sec": "B-3", "ko": "네가 파리에 가면 루브르 박물관을 방문해야 한다.", "en": "You should visit the Louvre if you go to Paris."}, {"sec": "B-4", "ko": "네가 시험을 잘 볼 것은 확실하다.", "en": "It is certain that you will do well on the test."}, {"sec": "B-5", "ko": "그녀는 네가 그녀를 보러 와서 매우 기뻤다.", "en": "She was very happy because you came to see her."}, {"sec": "B-6", "ko": "사실은 그가 유죄가 아니라는 것이다.", "en": "The fact is that he is not guilty."}, {"sec": "B-7", "ko": "네가 모든 시험에서 95점을 받으면, 내가 새 휴대전화를 사 줄게.", "en": "If you get 95% on all your tests, I'll buy you a new cell phone."}, {"sec": "C-1", "ko": "밖이 춥기 때문에 너는 이 코트를 입어야 한다.", "en": "You should wear this coat because it's cold outside."}, {"sec": "C-2", "ko": "네가 나를 따라오면, 내 개를 보여 줄게.", "en": "If you follow me, I'll show you my dog."}, {"sec": "C-3", "ko": "내 아들은 충치가 있어서 치과에 갔다.", "en": "My son went to the dentist because he had a rotten tooth."}, {"sec": "C-4", "ko": "나는 그녀가 최선을 다했다는 것을 안다.", "en": "I know that she did her best."}, {"sec": "C-5", "ko": "네가 지금 떠나면, 기차를 탈 수 있다.", "en": "If you leave now, you can catch the train."}]}];
const STORE='surinamu_grammar_units_29_31_unscramble_v1';
const $=(q,root=document)=>root.querySelector(q);
const $all=(q,root=document)=>Array.from(root.querySelectorAll(q));
let currentTab='unit', currentUnit=0, mode='full', quizItems=[], qIndex=0, roundCorrect=0, locked=false, questionHadWrong=false, lastWrongKey='', pendingQuestionHadWrong=false, audioCtx=null;
function getData(){try{return JSON.parse(localStorage.getItem(STORE)||'{}')}catch(e){return {}}}
function setData(data){localStorage.setItem(STORE,JSON.stringify(data))}
function unitState(id){const d=getData();return d[id]||{attempts:0,bestScore:0,lastScore:null,passed:false,wrongIds:[],doneIds:[],history:[],progress:null}}
function saveUnitState(id,patch){const d=getData();d[id]={...unitState(id),...patch};setData(d)}
function nowStr(){return new Date().toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})}
function shuffle(a){const arr=[...a];for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}return arr}
function tokens(s){return s.replace(/[“”]/g,'"').replace(/[‘’]/g,"'").split(/\s+/).filter(Boolean)}
function norm(s){return s.toLowerCase().replace(/[“”‘’'".,!?;:()\[\]%]/g,'').replace(/[^a-z0-9]+/g,' ').trim()}
function itemId(ui,ii){return 'u'+ui+'-'+ii}
function itemIndexFromId(id){return Number(String(id).split('-')[1])}
function totalItems(){return UNITS.reduce((a,u)=>a+u.items.length,0)}
function allWrongEntries(){const out=[];UNITS.forEach((u,ui)=>{const ids=unitState(u.id).wrongIds||[];ids.forEach(id=>{const ii=itemIndexFromId(id);if(u.items[ii])out.push({ui,id,item:u.items[ii]})})});return out}
function buildQuizItems(i,m,itemIds=null){
  const u=UNITS[i], st=unitState(u.id);
  let ids=[];
  if(Array.isArray(itemIds) && itemIds.length) ids=itemIds;
  else if(m==='wrong') ids=[...(st.wrongIds||[])].sort((a,b)=>itemIndexFromId(a)-itemIndexFromId(b));
  else ids=u.items.map((_,idx)=>itemId(i,idx)).filter(id=>!(st.doneIds||[]).includes(id));
  if(m==='full' && !ids.length) ids=u.items.map((_,idx)=>itemId(i,idx));
  return ids.map(id=>({item:u.items[itemIndexFromId(id)],id})).filter(x=>x.item);
}
function progressText(p){
  if(!p||!p.active)return '';
  const done=Math.min(p.qIndex||0,p.total||0), total=p.total||0, correct=p.correct||0;
  const score=done?Math.round(correct/done*100):0;
  return `${p.mode==='wrong'?'오답':'전체'} 진행 중 · ${done}/${total}문장 · 현재 ${correct}/${done||0} (${score}점)`;
}
function saveProgress(nextIndex=qIndex, correct=roundCorrect, extra={}){
  const u=UNITS[currentUnit]; if(!u||!quizItems.length)return;
  const st=unitState(u.id), old=st.progress||{};
  const progress={active:true,mode,qIndex:Math.max(0,Math.min(nextIndex,quizItems.length)),correct:Math.max(0,correct),total:quizItems.length,itemIds:quizItems.map(x=>x.id),questionHadWrong:!!questionHadWrong,startedAt:old.startedAt||nowStr(),updatedAt:nowStr(),...extra};
  saveUnitState(u.id,{progress});
}
function clearProgress(i=currentUnit){const u=UNITS[i]; if(!u)return; saveUnitState(u.id,{progress:null})}
function continueProgress(i){
  const u=UNITS[i], st=unitState(u.id), p=st.progress;
  if(!p||!p.active){startRound(i,'full');return;}
  currentTab='unit'; currentUnit=i; mode=p.mode||'full';
  quizItems=buildQuizItems(i,mode,p.itemIds);
  qIndex=Math.max(0,Math.min(p.qIndex||0,quizItems.length));
  roundCorrect=p.correct||0; locked=false; lastWrongKey=''; pendingQuestionHadWrong=!!p.questionHadWrong;
  renderShell(); const box=$(`#quiz-${i}`); if(box)box.classList.remove('hidden');
  if(qIndex>=quizItems.length) finishRound(); else loadQuestion();
}
function initAudio(){try{audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume();}catch(e){}}
function tone(f,d=0.12,type='sine',vol=.08){if(!audioCtx)return;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=type;o.frequency.value=f;g.gain.setValueAtTime(vol,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.01,audioCtx.currentTime+d);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+d)}
function sfxOK(){initAudio();tone(620,.09);setTimeout(()=>tone(880,.14),90)}
function sfxNG(){initAudio();tone(220,.16,'sawtooth',.06)}
function showOkFlash(){
  const old=$('.ok-pop');if(old)old.remove();
  const el=document.createElement('div');el.className='ok-pop';el.textContent='OK';document.body.appendChild(el);setTimeout(()=>el.remove(),900);
  for(let i=0;i<12;i++){const c=document.createElement('div');c.className='confetti';c.style.setProperty('--x',`${Math.round((Math.random()*2-1)*120)}px`);c.style.setProperty('--y',`${Math.round((Math.random()*-1)*120-20)}px`);document.body.appendChild(c);setTimeout(()=>c.remove(),800)}
}
function renderShell(){renderTabs();const sections=$('#sections');sections.innerHTML='';UNITS.forEach((u,i)=>{const sec=document.createElement('section');sec.id='section-unit-'+i;sec.className='section '+(currentTab==='unit'&&currentUnit===i?'active':'');sections.appendChild(sec);renderUnitHome(i)});const rec=document.createElement('section');rec.id='section-record';rec.className='section '+(currentTab==='record'?'active':'');sections.appendChild(rec);renderGlobalRecord();const wrong=document.createElement('section');wrong.id='section-wrong';wrong.className='section '+(currentTab==='wrong'?'active':'');sections.appendChild(wrong);renderGlobalWrong();}
function renderTabs(){const tabs=$('#tabs');tabs.innerHTML='';UNITS.forEach((u,i)=>{const st=unitState(u.id);const b=document.createElement('button');b.className='tab '+(currentTab==='unit'&&currentUnit===i?'active ':'')+(st.passed?'pass ':'');b.textContent=u.tab;b.onclick=()=>showUnit(i);tabs.appendChild(b)});const rb=document.createElement('button');rb.className='tab '+(currentTab==='record'?'active':'');rb.textContent='기록';rb.onclick=showRecord;tabs.appendChild(rb);const wb=document.createElement('button');wb.className='tab warn '+(currentTab==='wrong'?'active':'');wb.textContent='오답 '+allWrongEntries().length;wb.onclick=showWrong;tabs.appendChild(wb)}
function showUnit(i){currentTab='unit';currentUnit=i;mode='full';qIndex=0;renderShell();}
function showRecord(){currentTab='record';renderShell();}
function showWrong(){currentTab='wrong';renderShell();}
function renderUnitHome(i){
  const u=UNITS[i],st=unitState(u.id),sec=$('#section-unit-'+i);const wrongCount=(st.wrongIds||[]).length;const doneCount=(st.doneIds||[]).length;const p=st.progress;const inProgress=p&&p.active;
  const progressCard=inProgress?`<div class="card soft"><div class="record"><div><b>저장된 풀이</b><br><small>${progressText(p)}<br>마지막 저장: ${p.updatedAt||'-'}</small></div><strong>${Math.min(p.qIndex||0,p.total||0)}/${p.total||0}</strong></div><button class="btn orange" onclick="continueProgress(${i})">이어 풀기</button></div>`:'';
  sec.innerHTML=`<div class="card soft"><h2 class="unit-title">${u.title}</h2><div class="desc">${u.desc}</div><div class="top-tools"><span class="badge ${st.passed?'green':'gold'}">${st.passed?'통과 완료':'오답까지 완료해야 통과'}</span><span class="badge">${doneCount}/${u.items.length}문장</span><span class="badge red">오답 ${wrongCount}개</span></div><div class="progress"><div class="bar" style="width:${Math.round(doneCount/u.items.length*100)}%"></div></div></div>${progressCard}<div class="card"><div class="btn-row"><button class="btn" onclick="startRound(${i},'full')">이어 풀기 / 전체 풀기</button><button class="btn orange" onclick="startRound(${i},'wrong')" ${wrongCount?'':'disabled'}>오답 다시 풀기 (${wrongCount})</button></div><button class="btn secondary" onclick="restartUnit(${i})">이 Unit 처음부터 다시</button><div class="meta-line"><span class="badge">최고 ${st.bestScore||0}점</span><span class="badge">완료 ${doneCount}/${u.items.length}</span><span class="badge">최근 ${st.lastScore==null?'-':st.lastScore+'점'}</span></div></div><div id="quiz-${i}" class="hidden"></div>`;
}
function startRound(i,m){
  currentTab='unit';currentUnit=i;mode=m;qIndex=0;roundCorrect=0;locked=false;questionHadWrong=false;pendingQuestionHadWrong=false;lastWrongKey='';
  quizItems=buildQuizItems(i,m);
  if(m==='wrong'&&!quizItems.length){alert('남은 오답이 없습니다.');return}
  if(m==='full'&&!quizItems.length){alert('이미 모두 풀었습니다. 오답을 마무리하거나 처음부터 다시를 누르세요.');return}
  saveProgress(0,0,{questionHadWrong:false,startedAt:nowStr(),updatedAt:nowStr()});
  renderShell();$(`#quiz-${i}`).classList.remove('hidden');loadQuestion();
}
function loadQuestion(){
  locked=false;questionHadWrong=!!pendingQuestionHadWrong;pendingQuestionHadWrong=false;lastWrongKey='';
  const i=currentUnit,q=quizItems[qIndex],box=$(`#quiz-${i}`),total=quizItems.length,answerTokens=tokens(q.item.en),shuffled=shuffle(answerTokens.map((t,idx)=>({t,idx})));
  saveProgress(qIndex,roundCorrect,{questionHadWrong});
  box.innerHTML=`<div class="card quiz-head"><div class="status"><span class="badge">${mode==='wrong'?'오답':'전체'} ${qIndex+1} / ${total}</span><span class="badge">${q.item.sec}</span><span class="badge green">정답 ${roundCorrect}</span></div><div class="qno">한글 뜻</div><div class="ko">${q.item.ko}</div><div class="hint">단어를 위 답안 영역으로 옮기고 순서를 맞추세요. 모든 단어가 올라가면 자동으로 확인됩니다.</div></div><div id="answer" class="answer" aria-label="답안 영역"></div><div id="bank" class="bank" aria-label="단어 영역"></div><div id="feedback" class="feedback"></div>`;
  const bank=$('#bank');shuffled.forEach(obj=>{const chip=document.createElement('button');chip.type='button';chip.className='chip';chip.textContent=obj.t;chip.dataset.idx=obj.idx;chip.onclick=()=>moveChip(chip);bank.appendChild(chip)});setupSortable();setTimeout(()=>box.scrollIntoView({behavior:'smooth',block:'start'}),50);
}
function setupSortable(){if(!window.Sortable)return;if(window._grammarSortAnswer){try{window._grammarSortAnswer.destroy();window._grammarSortBank.destroy()}catch(e){}}const opts={group:'grammarWords',animation:160,ghostClass:'sortable-ghost',dragClass:'sortable-drag',fallbackOnBody:true,swapThreshold:.65,onEnd:()=>setTimeout(autoCheckIfReady,60)};window._grammarSortAnswer=Sortable.create($('#answer'),opts);window._grammarSortBank=Sortable.create($('#bank'),opts)}
function moveChip(chip){if(locked)return;initAudio();const ans=$('#answer'),bank=$('#bank');if(chip.parentElement===bank)ans.appendChild(chip);else bank.appendChild(chip);setTimeout(autoCheckIfReady,50)}
function autoCheckIfReady(){if(locked)return;const bank=$('#bank');if(!bank||bank.children.length!==0)return;checkAutoAnswer()}
function checkAutoAnswer(){
  if(locked)return;const q=quizItems[qIndex],ansTokens=$all('#answer .chip').map(c=>c.textContent),expectedTokens=tokens(q.item.en);if(ansTokens.length!==expectedTokens.length)return;const fb=$('#feedback'),key=norm(ansTokens.join(' '));const ok=key===norm(q.item.en);
  if(ok){locked=true;if(!questionHadWrong)roundCorrect++;markDone(q.id);if(mode==='wrong')removeWrong(q.id);showOkFlash();sfxOK();$('#answer').style.background='#e8fff4';$('#answer').style.borderColor='var(--green)';saveProgress(qIndex+1,roundCorrect,{questionHadWrong:false});const nextLabel=(qIndex+1<quizItems.length)?'다음 문제':'결과 보기';fb.className='feedback ok show';fb.innerHTML=`<div class="next-panel"><div class="ok-small">OK</div><button class="btn" onclick="nextQuestion()">${nextLabel}</button></div>`}
  else{questionHadWrong=true;addWrong(q.id);sfxNG();saveProgress(qIndex,roundCorrect,{questionHadWrong:true});$('#answer').style.background='#fff0f0';$('#answer').style.borderColor='var(--red)';if(lastWrongKey!==key){fb.className='feedback ng show';fb.innerHTML='<div class="try-msg">순서가 아직 맞지 않습니다. 위 답안 영역에서 단어를 드래그해 다시 맞춰 보세요.</div>';lastWrongKey=key}setTimeout(()=>{if(!locked){$('#answer').style.background='#eef7ff';$('#answer').style.borderColor='var(--main)'}},550)}
}
function markDone(id){const u=UNITS[currentUnit],st=unitState(u.id);const done=st.doneIds||[];if(!done.includes(id))done.push(id);const score=calcUnitScore(currentUnit,done,st.wrongIds||[]);const passed=done.length===u.items.length && (st.wrongIds||[]).length===0;saveUnitState(u.id,{doneIds:done,lastScore:score,bestScore:Math.max(st.bestScore||0,score),passed,lastTime:nowStr()});renderTabs()}
function calcUnitScore(ui,doneIds=null,wrongIds=null){const u=UNITS[ui],st=unitState(u.id);const d=doneIds||st.doneIds||[],w=wrongIds||st.wrongIds||[];return Math.max(0,Math.round((d.length-w.length)/u.items.length*100))}
function addWrong(id){const u=UNITS[currentUnit],st=unitState(u.id),arr=st.wrongIds||[];if(!arr.includes(id))arr.push(id);const passed=(st.doneIds||[]).length===u.items.length && arr.length===0;saveUnitState(u.id,{wrongIds:arr,passed,lastTime:nowStr()});renderTabs()}
function removeWrong(id){const u=UNITS[currentUnit],st=unitState(u.id),arr=(st.wrongIds||[]).filter(x=>x!==id);const done=st.doneIds||[];if(!done.includes(id))done.push(id);const score=calcUnitScore(currentUnit,done,arr);const passed=done.length===u.items.length && arr.length===0;saveUnitState(u.id,{wrongIds:arr,doneIds:done,lastScore:score,bestScore:Math.max(st.bestScore||0,score),passed,lastTime:nowStr()});renderTabs()}
function nextQuestion(){qIndex++;if(qIndex<quizItems.length){saveProgress(qIndex,roundCorrect,{questionHadWrong:false});loadQuestion()}else finishRound()}
function finishRound(){
  const i=currentUnit,u=UNITS[i],st=unitState(u.id),total=quizItems.length,score=Math.round(roundCorrect/total*100);const unitScore=calcUnitScore(i);const history=[{time:nowStr(),mode,correct:roundCorrect,total,score,unitScore},...(st.history||[])].slice(0,30);const passed=(unitState(u.id).doneIds||[]).length===u.items.length && (unitState(u.id).wrongIds||[]).length===0;saveUnitState(u.id,{attempts:(st.attempts||0)+1,lastScore:unitScore,bestScore:Math.max(st.bestScore||0,unitScore),history,passed,progress:null,lastTime:nowStr()});const left=(unitState(u.id).wrongIds||[]).length;const done=(unitState(u.id).doneIds||[]).length;const box=$(`#quiz-${i}`),emoji=passed?'🏆':'📝';box.innerHTML=`<div class="card complete show"><div class="big-emoji">${emoji}</div><h2 class="unit-title">${passed?'통과 완료!':'마무리 필요'}</h2><div class="score-big">${done}/${u.items.length}</div><div class="desc">${passed?'기록에서 PASS로 표시됩니다.':'남은 오답을 모두 맞히면 PASS 처리됩니다.'}<br>남은 오답: ${left}개</div><div class="btn-row"><button class="btn" onclick="startRound(${i},'full')">남은 문제 풀기</button><button class="btn orange" onclick="startRound(${i},'wrong')" ${left?'':'disabled'}>오답 다시 풀기</button></div><button class="btn secondary" onclick="showRecord()">기록 보기</button></div>`;renderTabs();
}
function restartUnit(i){if(!confirm('이 Unit의 진행 기록과 오답을 초기화하고 처음부터 다시 풀까요? 최고 점수 기록은 유지됩니다.'))return;const u=UNITS[i],st=unitState(u.id);saveUnitState(u.id,{attempts:st.attempts||0,bestScore:st.bestScore||0,lastScore:null,passed:false,wrongIds:[],doneIds:[],history:st.history||[],progress:null,lastTime:nowStr()});showUnit(i)}
function renderGlobalRecord(){
  const sec=$('#section-record');let totalPassed=0,totalAttempts=0;
  let html=`<div class="card soft"><h2 class="unit-title">📘 학습 기록</h2><div class="desc">Unit별 진행 상황과 PASS 여부를 확인합니다. 풀다가 나가도 저장된 위치부터 이어 풀 수 있습니다.</div></div><div class="unit-list">`;
  UNITS.forEach((u,ui)=>{
    const st=unitState(u.id);if(st.passed)totalPassed++;totalAttempts+=st.attempts||0;const wrong=(st.wrongIds||[]).length;const done=(st.doneIds||[]).length;const score=calcUnitScore(ui);const p=st.progress;
    const progressBlock=(p&&p.active)?`<div class="record"><div><b>진행 중</b><br><small>${progressText(p)}<br>마지막 저장: ${p.updatedAt||'-'}</small></div><strong>${Math.min(p.qIndex||0,p.total||0)}/${p.total||0}</strong></div><button class="btn orange" onclick="continueProgress(${ui})">저장된 위치부터 이어 풀기</button>`:'';
    const hist=(st.history||[]).slice(0,3).map(h=>`<div class="record"><div><b>${h.mode==='wrong'?'오답 풀이':'전체 풀이'}</b><br><small>${h.time}</small></div><strong>${h.correct}/${h.total}</strong></div>`).join('')||'<div class="empty">아직 완료 기록이 없습니다.</div>';
    html+=`<div class="card"><h3 class="unit-title">${u.tab} <span class="badge ${st.passed?'green':'gold'}">${st.passed?'PASS':'미통과'}</span></h3><div class="record-grid"><div class="record"><div><b>진행</b><br><small>${u.title}</small></div><strong>${done}/${u.items.length}</strong></div><div class="record"><div><b>현재 점수</b><br><small>오답 반영</small></div><strong>${score}점</strong></div><div class="record"><div><b>남은 오답</b><br><small>다시 맞히면 삭제</small></div><strong>${wrong}개</strong></div>${progressBlock}${hist}</div><div class="btn-row"><button class="btn" onclick="showUnit(${ui});startRound(${ui},'full')">이어 풀기</button><button class="btn orange" onclick="showUnit(${ui});startRound(${ui},'wrong')" ${wrong?'':'disabled'}>오답 풀기</button></div></div>`;
  });
  html+=`</div><div class="card soft"><div class="record"><div><b>전체 통과</b><br><small>총 ${totalItems()}문장 · 총 시도 ${totalAttempts}회</small></div><strong>${totalPassed}/${UNITS.length}</strong></div><button class="btn danger" onclick="clearAllRecords()">전체 기록 초기화</button></div>`;sec.innerHTML=html;
}
function renderGlobalWrong(){const sec=$('#section-wrong'),entries=allWrongEntries();let html=`<div class="card soft"><h2 class="unit-title">📝 오답 다시 풀기</h2><div class="desc">틀린 문제는 여기에 남습니다. 오답 풀이에서 맞히면 목록에서 삭제되고, 모든 문제와 오답을 끝내면 PASS가 됩니다.</div></div>`;if(!entries.length){html+='<div class="empty">남은 오답이 없습니다.</div>';sec.innerHTML=html;return}const grouped={};entries.forEach(e=>{(grouped[e.ui]||(grouped[e.ui]=[])).push(e)});Object.keys(grouped).forEach(key=>{const ui=Number(key),u=UNITS[ui];grouped[key].sort((a,b)=>itemIndexFromId(a.id)-itemIndexFromId(b.id));html+=`<div class="card"><div class="status"><h3 class="unit-title" style="margin:0">${u.tab}</h3><span class="badge red">${grouped[key].length}개</span></div><div class="wrong-list">${grouped[key].map(e=>`<div class="wrong-item"><div class="unit">${e.item.sec}</div><div>${e.item.ko}</div><div class="en">${e.item.en}</div></div>`).join('')}</div><button class="btn orange" onclick="showUnit(${ui});startRound(${ui},'wrong')">${u.tab} 오답 풀기</button></div>`});sec.innerHTML=html}
function clearAllRecords(){if(!confirm('전체 기록과 오답을 초기화할까요?'))return;localStorage.removeItem(STORE);renderShell()}
renderShell();
</script>
