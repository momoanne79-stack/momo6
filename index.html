<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>수리나무학원 중3 동아 윤정미 1과 영작·Dictation 학습앱</title>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<style>
:root{
  --navy:#13264a;--blue:#2959a8;--sky:#edf5ff;--violet:#6f5bd3;--gold:#ffbd3d;
  --green:#1f9d67;--red:#dc4d4d;--ink:#172033;--muted:#68758a;--line:#dbe5f2;
  --card:#fff;--bg:#f3f6fb;--shadow:0 14px 42px rgba(19,38,74,.14)
}
*{box-sizing:border-box}
html{background:var(--bg)}
body{margin:0;padding:12px;font-family:"Malgun Gothic","Apple SD Gothic Neo",Arial,sans-serif;color:var(--ink);background:radial-gradient(circle at 50% -10%,#dceaff 0,#f3f6fb 40%);min-height:100vh}
button,input,textarea{font:inherit}
button{touch-action:manipulation}
#app{max-width:620px;margin:0 auto;background:#fff;border-radius:24px;overflow:hidden;min-height:94vh;box-shadow:var(--shadow);position:relative;padding-bottom:28px}
.header{background:linear-gradient(145deg,#13264a,#2959a8 70%,#6f5bd3);color:#fff;padding:22px 18px 18px;text-align:center;position:relative;overflow:hidden}
.header:before,.header:after{content:"";position:absolute;border-radius:999px;background:rgba(255,255,255,.09)}
.header:before{width:180px;height:180px;right:-95px;top:-105px}.header:after{width:120px;height:120px;left:-70px;bottom:-80px}
.logo{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.28);padding:7px 13px;border-radius:999px;font-size:13px;font-weight:1000;position:relative;z-index:1}
.lesson{font-size:11px;font-weight:1000;letter-spacing:.04em;color:#ffe2a0;margin:9px 0 5px;position:relative;z-index:1}
.header h1{font-family:Georgia,"Times New Roman",serif;font-size:24px;margin:0;line-height:1.2;position:relative;z-index:1}
.header p{font-size:13px;margin:7px 0 0;opacity:.9;font-weight:800;position:relative;z-index:1}
.nav{display:flex;gap:5px;padding:10px;background:#fff;position:sticky;top:0;z-index:20;border-bottom:1px solid #eef2f7;overflow-x:auto}
.nav-btn{flex:1;min-width:67px;border:0;border-radius:10px;padding:9px 5px;background:#edf1f6;color:#536078;font-weight:1000;font-size:12px;cursor:pointer;white-space:nowrap}
.nav-btn.active{background:var(--navy);color:#fff;box-shadow:0 5px 13px rgba(19,38,74,.2)}
.section{display:none;padding:15px 17px 0;animation:fade .25s ease}.section.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.card{background:#fff;border:1.5px solid var(--line);border-radius:17px;padding:15px;margin-bottom:13px}
.section-title{font-size:18px;color:var(--navy);margin:0 0 10px;font-weight:1000}
.note{background:var(--sky);border-left:4px solid var(--blue);border-radius:12px;padding:11px 13px;font-size:13px;font-weight:800;line-height:1.6;margin-bottom:13px}
.tool-row{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px}.mini{border:0;border-radius:10px;padding:8px 10px;background:#eef2f7;color:#48566d;font-size:12px;font-weight:1000;cursor:pointer}.mini.primary{background:var(--blue);color:#fff}.mini.warn{background:#fff4d8;color:#7b5500}
.story-card{border:1.5px solid var(--line);border-radius:17px;padding:14px;margin-bottom:13px;background:#fff}
.story-head{display:flex;align-items:center;justify-content:space-between;gap:9px;margin-bottom:8px}.story-head h3{margin:0;color:var(--navy);font-size:16px}.story-count{font-size:11px;color:var(--muted);font-weight:900;background:#f0f4f9;padding:5px 8px;border-radius:999px}
.story-line{padding:10px 0;border-top:1px dashed #dfe7f1}.story-line:first-of-type{border-top:0;padding-top:2px}.story-en{font-family:Georgia,"Times New Roman",serif;font-weight:700;font-size:16px;line-height:1.65}.story-ko{color:#536078;font-size:14px;line-height:1.55;margin-top:3px}.line-play{float:right;margin-left:8px;border:0;background:#edf5ff;border-radius:8px;padding:5px 8px;cursor:pointer}
.mode-tabs{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:11px}.mode-btn{border:2px solid var(--line);background:#fff;border-radius:12px;padding:10px;font-weight:1000;color:#526078;cursor:pointer}.mode-btn.active{border-color:var(--blue);background:var(--sky);color:var(--blue)}
.progress-card{background:linear-gradient(135deg,#f0f6ff,#f5f0ff);border:1.5px solid #d8e3f4;border-radius:16px;padding:12px;margin-bottom:12px}.progress-top{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:8px}.stage{font-weight:1000;color:var(--navy);font-size:13px}.progress-num{font-size:13px;font-weight:1000;color:var(--blue)}.bar{height:10px;background:#dfe7f1;border-radius:999px;overflow:hidden}.bar>div{height:100%;background:linear-gradient(90deg,var(--gold),var(--blue),var(--violet));width:0;transition:.35s}
.practice-card{border:2px solid #d8e4f3;border-radius:18px;padding:15px;background:#fff;position:relative}.section-chip{display:inline-flex;background:#eef3fa;color:#5a6680;padding:5px 9px;border-radius:999px;font-size:11px;font-weight:1000;margin-bottom:8px}.meaning{background:#edf5ff;border-left:4px solid var(--blue);border-radius:11px;padding:12px 13px;font-size:15px;line-height:1.55;font-weight:900;color:#1a3769;margin-bottom:12px}.meaning.hidden{filter:blur(7px);user-select:none;cursor:pointer}.instruction{font-size:12px;color:#6b7587;line-height:1.5;font-weight:800;margin:7px 0 11px}.answer-area{min-height:67px;border:2px dashed var(--blue);background:#f3f8ff;border-radius:14px;padding:10px;display:flex;flex-wrap:wrap;gap:7px;align-content:flex-start;margin-bottom:10px;transition:.2s}.answer-area.ok{background:#e4f8ef;border-color:var(--green)}.answer-area.ng{background:#fff0f0;border-color:var(--red);animation:shake .3s}.bank{min-height:55px;display:flex;flex-wrap:wrap;gap:7px;justify-content:center;padding:4px 0 8px}.chip{border:2px solid #c9dbef;background:#fff;border-radius:10px;padding:8px 11px;font-family:Georgia,"Times New Roman",serif;font-size:15px;font-weight:700;color:#1c345b;box-shadow:0 2px 6px rgba(19,38,74,.06);cursor:pointer;user-select:none}.chip:active{transform:scale(.97)}
.text-input{width:100%;min-height:118px;border:2px solid #cbd9ea;border-radius:14px;padding:13px;font-family:Georgia,"Times New Roman",serif;font-size:17px;line-height:1.6;resize:vertical;outline:none}.text-input:focus{border-color:var(--blue);box-shadow:0 0 0 4px rgba(41,89,168,.08)}.text-input.ok{background:#e9f9f1;border-color:var(--green)}.text-input.ng{background:#fff2f2;border-color:var(--red);animation:shake .3s}
.feedback{min-height:24px;font-size:13px;font-weight:1000;text-align:center;margin:7px 0 0}.feedback.ok{color:var(--green)}.feedback.ng{color:var(--red)}
.audio-row{display:grid;grid-template-columns:1.2fr .9fr;gap:7px;margin-top:11px}.audio-btn{border:0;border-radius:11px;padding:11px 7px;font-size:13px;font-weight:1000;cursor:pointer}.audio-btn.play{background:var(--navy);color:#fff}.audio-btn.speed{background:#eaf0f7;color:#4f5c72}
.action-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:9px}.action-row.single{grid-template-columns:1fr}.action{border:0;border-radius:12px;padding:12px;font-weight:1000;cursor:pointer}.action.check{background:var(--blue);color:#fff}.action.soft{background:#eef2f7;color:#536078}
.word-intro{text-align:center;padding:25px 8px}.big-icon{font-size:3.4rem}.word-intro h2{color:var(--navy);font-size:20px;margin:8px 0}.word-intro p{font-size:14px;color:var(--muted);line-height:1.6;font-weight:800}.primary-btn{width:100%;border:0;border-radius:13px;padding:14px;background:var(--blue);color:#fff;font-size:15px;font-weight:1000;cursor:pointer}.primary-btn.gold{background:var(--gold);color:#5b3b00}.word-q{text-align:center;font-family:Georgia,"Times New Roman",serif;font-size:27px;color:var(--blue);font-weight:700;margin:15px 0}.options{display:grid;gap:8px}.option{border:2px solid var(--line);border-radius:12px;background:#fff;padding:12px;text-align:left;font-weight:900;cursor:pointer}.option.correct{border-color:var(--green);background:#e5f8ef;color:#16734c}.option.wrong{border-color:var(--red);background:#fff0f0;color:#a93636}
.review-empty{text-align:center;padding:30px 10px}.review-empty .big{font-size:4rem}.review-empty h3{color:var(--green)}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px}.summary-card{border:1.5px solid var(--line);border-radius:15px;padding:13px;background:#fff}.summary-label{font-size:12px;color:var(--muted);font-weight:900}.summary-value{font-size:25px;font-weight:1000;color:var(--navy);margin-top:3px}.summary-card.bad .summary-value{color:var(--red)}.summary-card.good .summary-value{color:var(--green)}
.pass-box{text-align:center;border:3px solid var(--line);border-radius:19px;padding:18px;margin-bottom:13px;background:#f9fbfd}.pass-box.pass{border-color:var(--green);background:#ebfaf3}.pass-mark{font-size:34px;font-weight:1000;color:#8994a6;letter-spacing:.08em}.pass-box.pass .pass-mark{color:var(--green)}.pass-sub{font-size:13px;color:var(--muted);font-weight:900;margin-top:4px}
.copy-box{background:#152849;color:#fff;border-radius:15px;padding:13px;margin-bottom:12px}.copy-title{font-size:12px;color:#cbd8ef;font-weight:900;margin-bottom:6px}.copy-text{font-size:15px;font-weight:1000;line-height:1.6;word-break:keep-all}.copy-btn{margin-top:10px;border:0;border-radius:9px;background:#fff;color:#152849;padding:8px 11px;font-size:12px;font-weight:1000;cursor:pointer}
.section-progress{border:1.5px solid var(--line);border-radius:15px;padding:12px;margin-bottom:9px}.sp-head{display:flex;justify-content:space-between;gap:8px;font-size:13px;font-weight:1000;color:var(--navy);margin-bottom:7px}.sp-detail{font-size:12px;color:var(--muted);font-weight:800}.danger{width:100%;border:1.5px solid #f0bcbc;background:#fff7f7;color:#b23838;border-radius:12px;padding:11px;font-weight:1000;cursor:pointer;margin-top:10px}
.toast{position:fixed;left:50%;top:38%;transform:translate(-50%,-50%) scale(.8);opacity:0;pointer-events:none;background:#172c50;color:#fff;border:2px solid #ffd36d;border-radius:999px;padding:10px 18px;font-weight:1000;z-index:1000;box-shadow:0 12px 32px rgba(0,0,0,.2)}.toast.show{animation:toast .95s ease forwards}@keyframes toast{0%{opacity:0;transform:translate(-50%,-20%) scale(.7)}20%{opacity:1;transform:translate(-50%,-50%) scale(1.08)}75%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-72%) scale(.95)}}
.confetti{position:fixed;z-index:999;width:9px;height:13px;border-radius:2px;pointer-events:none;animation:fall 1.2s ease-out forwards}@keyframes fall{0%{opacity:1;transform:translate(0,0) rotate(0)}100%{opacity:0;transform:translate(var(--x),var(--y)) rotate(540deg)}}
@keyframes shake{0%,100%{transform:translateX(0)}30%{transform:translateX(-5px)}60%{transform:translateX(5px)}}
@media(max-width:440px){body{padding:6px}#app{border-radius:17px}.header{padding:19px 13px 15px}.header h1{font-size:21px}.section{padding:13px 12px 0}.nav{padding:8px 6px}.nav-btn{min-width:62px;font-size:11px}.story-en{font-size:15px}.chip{font-size:14px;padding:8px 9px}.summary-value{font-size:22px}.audio-row{grid-template-columns:1.15fr .85fr .85fr}}
</style>
</head>
<body>
<div id="app">
  <div id="toast" class="toast">정답!</div>
  <header class="header">
    <div class="logo">🌳 수리나무학원</div>
    <div class="lesson">중3 · 동아(윤정미) · Lesson 1</div>
    <h1>Follow Your Dream</h1>
    <p>38문장 · 영작 &amp; Dictation 집중 학습</p>
  </header>
  <nav class="nav">
    <button class="nav-btn" data-sec="word" onclick="showSection('word',this)">단어</button>
    <button class="nav-btn active" data-sec="practice" onclick="showSection('practice',this)">영작·Dictation</button>
    <button class="nav-btn" data-sec="review" onclick="showSection('review',this)">오답 <span id="wrong-badge"></span></button>
    <button class="nav-btn" data-sec="record" onclick="showSection('record',this)">기록</button>
  </nav>

  <section id="word" class="section">
    <div id="word-intro" class="word-intro">
      <div class="big-icon">📷</div>
      <h2>Lesson 1 핵심 단어</h2>
      <p>Lesson 1의 주요 표현을 4지선다로 확인합니다.<br>맞힌 단어는 기록에 자동 저장됩니다.</p>
      <button class="primary-btn" onclick="startWordQuiz()">단어 테스트 시작</button>
    </div>
    <div id="word-quiz" style="display:none">
      <div class="progress-card"><div class="progress-top"><span class="stage">핵심 단어</span><span id="word-status" class="progress-num"></span></div><div class="bar"><div id="word-bar"></div></div></div>
      <div class="card"><div id="word-q" class="word-q"></div><div id="word-options" class="options"></div></div>
    </div>
    <div id="word-result" style="display:none" class="word-intro">
      <div class="big-icon">🏆</div><h2>단어 테스트 완료</h2><p id="word-result-text"></p><button class="primary-btn" onclick="startWordQuiz()">다시 풀기</button>
    </div>
  </section>

  <section id="practice" class="section active">
    <div class="mode-tabs">
      <button id="mode-arrange" class="mode-btn active" onclick="setPracticeMode('arrange')">🧩 배열 영작</button>
      <button id="mode-type" class="mode-btn" onclick="setPracticeMode('type')">🎧 직접 Dictation</button>
    </div>
    <div class="progress-card">
      <div class="progress-top"><span id="practice-stage" class="stage"></span><span id="practice-status" class="progress-num"></span></div>
      <div class="bar"><div id="practice-bar"></div></div>
    </div>
    <div id="practice-box"></div>
  </section>

  <section id="review" class="section">
    <h2 class="section-title">오답 다시 풀기</h2>
    <div class="note">한 번이라도 틀린 문장은 일반 학습에서 맞혀도 오답에 남습니다. 이곳에서 다시 맞혀야 오답 목록에서 빠집니다.</div>
    <div id="review-box"></div>
  </section>

  <section id="record" class="section">
    <h2 class="section-title">선생님 검사 기록</h2>
    <div id="record-box"></div>
  </section>
</div>
<script>
const SENTENCES = [{"en":"Hello, everyone.","ko":"여러분, 안녕하세요.","section":"본문 1 · 꿈을 찾기 전","id":0},{"en":"My name is David Parker, and I'm a photographer.","ko":"제 이름은 David Parker이고, 저는 사진작가입니다.","section":"본문 1 · 꿈을 찾기 전","id":1},{"en":"Today, I'm going to tell you how I found my dream and realized it.","ko":"오늘 저는 여러분에게 제가 어떻게 꿈을 찾고 그것을 실현했는지 이야기하려고 해요.","section":"본문 1 · 꿈을 찾기 전","id":2},{"en":"I hope my story can inspire you.","ko":"제 이야기가 여러분에게 영감을 줄 수 있기를 바랍니다.","section":"본문 1 · 꿈을 찾기 전","id":3},{"en":"When I was young, I loved stars.","ko":"저는 어렸을 때 별을 사랑했어요.","section":"본문 1 · 꿈을 찾기 전","id":4},{"en":"I also liked taking pictures.","ko":"또한 사진 찍는 것도 좋아했죠.","section":"본문 1 · 꿈을 찾기 전","id":5},{"en":"However, I never thought these things could lead to a job.","ko":"하지만 저는 이것들이 직업으로 이어질 수 있으리라고는 전혀 생각하지 못했어요.","section":"본문 1 · 꿈을 찾기 전","id":6},{"en":"In fact, I didn't have a dream at all.","ko":"사실 저는 아예 꿈이 없었거든요.","section":"본문 1 · 꿈을 찾기 전","id":7},{"en":"When I had to decide on a major in college, I chose engineering.","ko":"대학에서 전공을 정해야 했을 때, 저는 공학을 선택했어요.","section":"본문 1 · 꿈을 찾기 전","id":8},{"en":"Being an engineer looked OK.","ko":"엔지니어가 되는 것이 괜찮아 보였거든요.","section":"본문 1 · 꿈을 찾기 전","id":9},{"en":"After college, I got a job at an engineering company.","ko":"대학 졸업 후에 저는 엔지니어링 회사에 취직했어요.","section":"본문 1 · 꿈을 찾기 전","id":10},{"en":"It was a stable job, but I didn't know whether I really enjoyed it.","ko":"그것은 안정적인 직업이었지만, 저는 제가 그 일을 정말로 즐기는지는 알 수 없었어요.","section":"본문 1 · 꿈을 찾기 전","id":11},{"en":"Everything changed when I went on vacation to Iceland one winter.","ko":"어느 겨울, 제가 아이슬란드로 휴가를 갔을 때 모든 것이 바뀌었어요.","section":"본문 1 · 꿈을 찾기 전","id":12},{"en":"There I got a chance to see the Northern Lights.","ko":"그곳에서 저는 오로라를 볼 기회가 있었어요.","section":"본문 1 · 꿈을 찾기 전","id":13},{"en":"The lights were amazing, and I took many pictures of the dancing lights in the sky.","ko":"빛들은 경이로웠고, 저는 하늘에서 춤추는 빛들의 사진을 많이 찍었어요.","section":"본문 1 · 꿈을 찾기 전","id":14},{"en":"For the first time in many years, I could feel my heart beating fast.","ko":"수년 만에 처음으로 제 심장이 빠르게 뛰고 있는 것을 느낄 수 있었어요.","section":"본문 1 · 꿈을 찾기 전","id":15},{"en":"After I came back, I entered a photo contest with the pictures I took in Iceland.","ko":"돌아온 후에 저는 아이슬란드에서 찍은 사진으로 사진 경연 대회에 참가했어요.","section":"본문 2 · 사진작가가 되기까지","id":16},{"en":"Surprisingly, I won first prize, and this gave me a chance to think about my life.","ko":"놀랍게도 저는 1등 상을 받았고, 이 일은 저에게 제 인생에 대해 생각해 볼 기회를 주었어요.","section":"본문 2 · 사진작가가 되기까지","id":17},{"en":"I realized that taking pictures made me happy.","ko":"저는 사진을 찍는 것이 저를 행복하게 한다는 것을 깨달았어요.","section":"본문 2 · 사진작가가 되기까지","id":18},{"en":"Suddenly, I wanted to become a good photographer, so I started to learn more about photography.","ko":"갑자기 저는 좋은 사진작가가 되고 싶었고, 그래서 사진 촬영 기술에 대해 더 배우기 시작했어요.","section":"본문 2 · 사진작가가 되기까지","id":19},{"en":"After years of trial and error, I got better, and I began to do some part-time work as a photographer.","ko":"몇 년의 시행착오 끝에 저는 실력이 더 좋아졌고, 사진작가로 시간제 근무를 하기 시작했어요.","section":"본문 2 · 사진작가가 되기까지","id":20},{"en":"Then one day, I made a bold decision.","ko":"그러던 어느 날, 저는 대담한 결심을 했어요.","section":"본문 2 · 사진작가가 되기까지","id":21},{"en":"I quit my job and decided to take pictures for a living.","ko":"직장을 그만두고 생계 수단으로 사진을 찍기로 결정했죠.","section":"본문 2 · 사진작가가 되기까지","id":22},{"en":"I wasn't sure if I could succeed, but I decided to try.","ko":"제가 성공할 수 있을지 확신하지는 못했지만 시도해 보기로 결심했어요.","section":"본문 2 · 사진작가가 되기까지","id":23},{"en":"I really wanted to do something that made me happy.","ko":"저는 저를 행복하게 만드는 무언가를 정말로 하고 싶었거든요.","section":"본문 2 · 사진작가가 되기까지","id":24},{"en":"Now, I'm a professional photographer, and I'm happy.","ko":"지금, 저는 전문 사진작가이고 행복합니다.","section":"본문 2 · 사진작가가 되기까지","id":25},{"en":"So do you want to find a dream and realize it?","ko":"그렇다면 여러분은 꿈을 찾고 그 꿈을 실현하고 싶은가요?","section":"본문 3 · 꿈을 이루는 세 가지 조언","id":26},{"en":"Here's some advice to help you.","ko":"여기 여러분을 도와줄 몇 가지 조언이 있습니다.","section":"본문 3 · 꿈을 이루는 세 가지 조언","id":27},{"en":"First, follow your heart.","ko":"첫째, 여러분의 마음을 따르세요.","section":"본문 3 · 꿈을 이루는 세 가지 조언","id":28},{"en":"Think about what you like to do and what makes you happy.","ko":"여러분이 무엇을 하는 것을 좋아하는지, 그리고 여러분을 행복하게 하는 것이 무엇인지 생각해 보세요.","section":"본문 3 · 꿈을 이루는 세 가지 조언","id":29},{"en":"In my case, it was taking pictures of stars.","ko":"제 경우에는, 그것이 별 사진을 찍는 것이었습니다.","section":"본문 3 · 꿈을 이루는 세 가지 조언","id":30},{"en":"Second, work hard.","ko":"둘째, 열심히 노력하세요.","section":"본문 3 · 꿈을 이루는 세 가지 조언","id":31},{"en":"Pursuing a dream is not easy.","ko":"꿈을 추구하는 것은 쉽지 않아요.","section":"본문 3 · 꿈을 이루는 세 가지 조언","id":32},{"en":"I became a photographer through hard work.","ko":"저는 열심히 노력해서 사진작가가 되었습니다.","section":"본문 3 · 꿈을 이루는 세 가지 조언","id":33},{"en":"Third, be bold.","ko":"셋째, 대담해지세요.","section":"본문 3 · 꿈을 이루는 세 가지 조언","id":34},{"en":"You need courage to make decisions that will change your life.","ko":"여러분의 인생을 바꿀 결정을 하기 위해서는 용기가 필요합니다.","section":"본문 3 · 꿈을 이루는 세 가지 조언","id":35},{"en":"I was afraid but I took a chance.","ko":"저는 두려웠지만 기회를 잡았어요.","section":"본문 3 · 꿈을 이루는 세 가지 조언","id":36},{"en":"I truly hope you can find a dream, pursue it, and live it!","ko":"저는 여러분이 꿈을 찾고, 꿈을 추구하고, 꿈을 실현할 수 있길 진심으로 바랍니다!","section":"본문 3 · 꿈을 이루는 세 가지 조언","id":37}];
const WORDS = [{"en":"photographer","ko":"사진작가"},{"en":"realize","ko":"실현하다; 깨닫다"},{"en":"inspire","ko":"영감을 주다"},{"en":"lead to","ko":"~로 이어지다"},{"en":"in fact","ko":"사실은"},{"en":"at all","ko":"전혀, 조금도"},{"en":"decide on","ko":"~을 결정하다"},{"en":"major","ko":"전공"},{"en":"engineering","ko":"공학"},{"en":"stable","ko":"안정적인"},{"en":"whether","ko":"~인지 아닌지"},{"en":"go on vacation","ko":"휴가를 가다"},{"en":"get a chance to","ko":"~할 기회를 얻다"},{"en":"the Northern Lights","ko":"오로라"},{"en":"amazing","ko":"놀라운, 경이로운"},{"en":"enter a contest","ko":"대회에 참가하다"},{"en":"surprisingly","ko":"놀랍게도"},{"en":"win first prize","ko":"1등 상을 받다"},{"en":"photography","ko":"사진 촬영 기술"},{"en":"trial and error","ko":"시행착오"},{"en":"part-time work","ko":"시간제 근무"},{"en":"make a bold decision","ko":"대담한 결정을 내리다"},{"en":"quit one's job","ko":"직장을 그만두다"},{"en":"for a living","ko":"생계 수단으로"},{"en":"succeed","ko":"성공하다"},{"en":"professional","ko":"전문적인; 전문가의"},{"en":"advice","ko":"조언"},{"en":"follow one's heart","ko":"마음이 이끄는 대로 하다"},{"en":"pursue","ko":"추구하다"},{"en":"through hard work","ko":"열심히 노력하여"},{"en":"courage","ko":"용기"},{"en":"take a chance","ko":"기회를 잡다; 모험하다"}];
const STORE_KEY = 'suri_donga_yoon_l1_dream_dictation_v2';
const SECTIONS = [...new Set(SENTENCES.map(x=>x.section))];
const SPEEDS = [0.82,0.68,0.54];
const SPEED_LABELS = ['보통','느리게','아주 느리게'];
let speedIndex=0, loopOn=false, loopTimer=null, selectedVoice=null, audioCtx=null;
let memoryStore=null;
let practiceMode='arrange', practiceSortable=null, practiceChecking=false;
let reviewSortable=null, reviewChecking=false;
let wordOrder=[], wordIndex=0, wordCorrect=0, wordBusy=false;

function defaultState(){return{
  arrangeDone:[], typeDone:[], wrongIds:[], wrongCounts:{}, wordDone:[],
  cursor:{arrange:0,type:0}, reviewPassed:0,
  today:{date:todayKey(),attempts:0,correct:0,wrong:0},
  lastMode:'arrange'
}}
function todayKey(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function loadState(){
  let x;try{x=JSON.parse(localStorage.getItem(STORE_KEY)||'null')}catch(e){try{x=JSON.parse(memoryStore||'null')}catch(_){}}
  const d=defaultState();x=Object.assign(d,x||{});x.cursor=Object.assign(d.cursor,x.cursor||{});x.today=Object.assign(d.today,x.today||{});
  if(x.today.date!==todayKey())x.today={date:todayKey(),attempts:0,correct:0,wrong:0};
  for(const k of ['arrangeDone','typeDone','wrongIds','wordDone'])if(!Array.isArray(x[k]))x[k]=[];
  if(!x.wrongCounts||typeof x.wrongCounts!=='object')x.wrongCounts={};
  return x;
}
let state=loadState();practiceMode=state.lastMode||'arrange';
function saveState(){const raw=JSON.stringify(state);try{localStorage.setItem(STORE_KEY,raw)}catch(e){memoryStore=raw}updateWrongBadge()}
function uniquePush(arr,val){if(!arr.includes(val))arr.push(val)}
function recordAttempt(ok,id,isReview=false){
  state.today.attempts++; if(ok)state.today.correct++; else state.today.wrong++;
  if(!ok && id!==null){uniquePush(state.wrongIds,id);state.wrongCounts[id]=(state.wrongCounts[id]||0)+1}
  if(ok && isReview){state.wrongIds=state.wrongIds.filter(x=>x!==id);state.reviewPassed++}
  saveState();
}
function normalize(s){return String(s).toLowerCase().replace(/[’‘]/g,"'").replace(/[^a-z0-9]+/g,'')}
function tokenize(s){return String(s).replace(/[“”]/g,'').match(/[A-Za-z]+(?:['’][A-Za-z]+)?|\d+/g)||[]}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function shuffle(a){const x=[...a];for(let i=x.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[x[i],x[j]]=[x[j],x[i]]}return x}
function completed(mode){return mode==='arrange'?state.arrangeDone:state.typeDone}
function nextUndone(mode,start){const done=new Set(completed(mode));for(let step=0;step<SENTENCES.length;step++){const i=(start+step)%SENTENCES.length;if(!done.has(i))return i}return 0}
function modeComplete(mode){return completed(mode).length>=SENTENCES.length}
function showSection(id,btn){
  stopAudio();document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');btn.classList.add('active');
  if(id==='practice'){setPracticeMode(practiceMode,true);setTimeout(startAudioLoop,80)}
  if(id==='review'){renderReview();setTimeout(()=>{if(state.wrongIds.length)startAudioLoop()},80)}
  if(id==='record')renderRecord();
}
function updateWrongBadge(){document.getElementById('wrong-badge').textContent=state.wrongIds.length?`(${state.wrongIds.length})`:''}

function loadVoice(){if(!('speechSynthesis'in window))return;const vs=speechSynthesis.getVoices();selectedVoice=vs.find(v=>/^en-US$/i.test(v.lang)&&/Samantha|Ava|Alex|Google|Microsoft|English/i.test(v.name))||vs.find(v=>/^en-US$/i.test(v.lang))||vs.find(v=>/^en/i.test(v.lang))||null}
if('speechSynthesis'in window){loadVoice();speechSynthesis.onvoiceschanged=loadVoice}
function speak(text,onend){if(!('speechSynthesis'in window))return;loadVoice();speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='en-US';u.rate=SPEEDS[speedIndex];u.pitch=1;u.volume=1;if(selectedVoice)u.voice=selectedVoice;if(onend)u.onend=onend;speechSynthesis.speak(u)}
function activeSentence(){
  if(document.getElementById('review').classList.contains('active')&&state.wrongIds.length)return SENTENCES[state.wrongIds[0]];
  return SENTENCES[state.cursor[practiceMode]];
}
function startAudioLoop(){loopOn=true;playLoopOnce();updateAudioButtons()}
function playLoopOnce(){if(!loopOn)return;const s=activeSentence();if(!s)return;speak(s.en,()=>{if(loopOn)loopTimer=setTimeout(playLoopOnce,900)})}
function stopAudio(){loopOn=false;clearTimeout(loopTimer);if('speechSynthesis'in window)speechSynthesis.cancel();updateAudioButtons()}
function toggleAudio(){if(loopOn)stopAudio();else startAudioLoop()}
function toggleSpeed(){speedIndex=(speedIndex+1)%SPEEDS.length;document.querySelectorAll('.speed-label').forEach(x=>x.textContent=SPEED_LABELS[speedIndex]);if(loopOn){stopAudio();startAudioLoop()}}
function updateAudioButtons(){document.querySelectorAll('.play-label').forEach(x=>x.textContent=loopOn?'일시정지':'반복 듣기')}
function playOne(id){stopAudio();speak(SENTENCES[id].en)}
function playStoryAll(){stopAudio();const text=SENTENCES.map(x=>x.en).join(' ');speak(text)}

function renderStory(){
  const box=document.getElementById('story-list');box.innerHTML='';
  SECTIONS.forEach((sec,si)=>{const lines=SENTENCES.filter(x=>x.section===sec);const card=document.createElement('div');card.className='story-card';
    card.innerHTML=`<div class="story-head"><h3>${['🌌','📷','⭐'][si]} ${escapeHtml(sec)}</h3><span class="story-count">${lines.length}문장</span></div>`+
      lines.map(s=>`<div class="story-line"><button class="line-play" onclick="playOne(${s.id})">🔊</button><div class="story-en">${escapeHtml(s.en)}</div><div class="story-ko">${escapeHtml(s.ko)}</div></div>`).join('');box.appendChild(card)
  })
}
function toggleTranslations(){document.querySelectorAll('.story-ko').forEach(x=>x.style.display=x.style.display==='none'?'block':'none')}

function setPracticeMode(mode,quiet=false){
  practiceMode=mode;state.lastMode=mode;saveState();
  document.getElementById('mode-arrange').classList.toggle('active',mode==='arrange');document.getElementById('mode-type').classList.toggle('active',mode==='type');
  if(modeComplete(mode))state.cursor[mode]=0;else state.cursor[mode]=nextUndone(mode,state.cursor[mode]||0);
  saveState();renderPractice();if(!quiet){stopAudio();startAudioLoop()}
}
function renderPractice(){
  practiceChecking=false;const id=state.cursor[practiceMode],s=SENTENCES[id],done=completed(practiceMode).length;
  document.getElementById('practice-stage').textContent=practiceMode==='arrange'?'배열 영작':'직접 Dictation';
  document.getElementById('practice-status').textContent=`${Math.min(done+1,SENTENCES.length)} / ${SENTENCES.length}`;
  document.getElementById('practice-bar').style.width=`${Math.round(done/SENTENCES.length*100)}%`;
  const box=document.getElementById('practice-box');
  if(modeComplete(practiceMode)){
    box.innerHTML=`<div class="review-empty card"><div class="big">🎉</div><h3>${practiceMode==='arrange'?'배열 영작':'직접 Dictation'} 완료!</h3><p>38문장을 모두 통과했습니다.</p><button class="primary-btn" onclick="restartMode()">처음부터 다시 풀기</button></div>`;return
  }
  const common=`<div class="practice-card"><div class="section-chip">${escapeHtml(s.section)}</div><div id="practice-meaning" class="meaning ${practiceMode==='type'?'hidden':''}" onclick="this.classList.remove('hidden')">${escapeHtml(s.ko)}</div>`;
  if(practiceMode==='arrange'){
    box.innerHTML=common+`<div class="instruction">단어를 눌러 문장을 완성하세요. 답안 칸에서 드래그해 순서를 바꿀 수 있습니다. 틀리면 오답에 저장되고, 맞으면 자동으로 다음 문장으로 넘어갑니다.</div><div id="answer-area" class="answer-area"></div><div id="word-bank" class="bank"></div><div id="practice-feedback" class="feedback"></div><div class="audio-row"><button class="audio-btn play" onclick="toggleAudio()">▶ <span class="play-label">${loopOn?'일시정지':'반복 듣기'}</span></button><button class="audio-btn speed" onclick="toggleSpeed()">🐢 <span class="speed-label">${SPEED_LABELS[speedIndex]}</span></button></div><div class="action-row single"><button class="action check" onclick="checkArrange()">채점</button></div></div>`;
    fillArrangement(s.en)
  }else{
    box.innerHTML=common+`<div class="instruction">영어 음성을 듣고 문장을 직접 입력하세요. 대소문자와 문장부호는 채점에서 제외됩니다. 해석은 흐리게 표시되며 누르면 확인할 수 있습니다.</div><textarea id="dict-input" class="text-input" autocapitalize="sentences" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="들은 문장을 영어로 입력하세요."></textarea><div id="practice-feedback" class="feedback"></div><div class="audio-row"><button class="audio-btn play" onclick="toggleAudio()">▶ <span class="play-label">${loopOn?'일시정지':'반복 듣기'}</span></button><button class="audio-btn speed" onclick="toggleSpeed()">🐢 <span class="speed-label">${SPEED_LABELS[speedIndex]}</span></button></div><div class="action-row"><button class="action soft" onclick="document.getElementById('dict-input').value=''">지우기</button><button class="action check" onclick="checkTyped()">채점</button></div></div>`;
    const ta=document.getElementById('dict-input');ta.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='Enter')checkTyped()});setTimeout(()=>ta.focus(),80)
  }
  updateAudioButtons()
}
function fillArrangement(text){
  const bank=document.getElementById('word-bank'),ans=document.getElementById('answer-area');bank.innerHTML='';ans.innerHTML='';
  shuffle(tokenize(text)).forEach(w=>{const b=document.createElement('button');b.type='button';b.className='chip';b.textContent=w;b.onclick=()=>{(b.parentElement===bank?ans:bank).appendChild(b);if(bank.children.length===0)setTimeout(checkArrange,80)};bank.appendChild(b)});
  if(practiceSortable)try{practiceSortable.destroy()}catch(e){}
  if(window.Sortable)practiceSortable=new Sortable(ans,{animation:160,ghostClass:'ghost',onEnd:()=>{if(bank.children.length===0)setTimeout(checkArrange,80)}})
}
function resetArrangement(){fillArrangement(activeSentence().en);setFeedback('',null)}
function setFeedback(msg,type){const el=document.getElementById('practice-feedback');if(!el)return;el.textContent=msg;el.className='feedback'+(type?' '+type:'')}
function checkArrange(){
  if(practiceChecking)return;const bank=document.getElementById('word-bank'),ans=document.getElementById('answer-area');if(!bank||bank.children.length){setFeedback('남은 단어를 모두 답안 칸으로 옮겨 주세요.','ng');return}
  const id=state.cursor[practiceMode],s=SENTENCES[id],text=[...ans.children].map(x=>x.textContent).join(' '),ok=normalize(text)===normalize(s.en);
  if(ok){practiceChecking=true;ans.classList.add('ok');setFeedback('정답! 다음 문장으로 이동합니다.','ok');recordAttempt(true,id);uniquePush(state.arrangeDone,id);saveState();successEffect('영작 성공!');stopAudio();setTimeout(()=>advancePractice('arrange'),850)}
  else{ans.classList.add('ng');setTimeout(()=>ans.classList.remove('ng'),350);setFeedback('순서가 맞지 않습니다. 다시 배열해 보세요.','ng');recordAttempt(false,id);errorSound()}
}
function checkTyped(){
  if(practiceChecking)return;const ta=document.getElementById('dict-input');if(!ta||!ta.value.trim()){setFeedback('들은 문장을 먼저 입력해 주세요.','ng');return}
  const id=state.cursor[practiceMode],s=SENTENCES[id],ok=normalize(ta.value)===normalize(s.en);
  if(ok){practiceChecking=true;ta.classList.add('ok');setFeedback('정답! 다음 문장으로 이동합니다.','ok');recordAttempt(true,id);uniquePush(state.typeDone,id);saveState();successEffect('Dictation 성공!');stopAudio();setTimeout(()=>advancePractice('type'),850)}
  else{ta.classList.add('ng');setTimeout(()=>ta.classList.remove('ng'),350);const a=tokenize(ta.value),b=tokenize(s.en);let same=0;for(let i=0;i<Math.min(a.length,b.length);i++)if(normalize(a[i])===normalize(b[i]))same++;setFeedback(`다시 들어 보세요. 앞에서부터 ${same}개 단어가 정확합니다.`, 'ng');recordAttempt(false,id);errorSound()}
}
function advancePractice(mode){
  const cur=state.cursor[mode];if(modeComplete(mode)){renderPractice();renderRecord();return}
  state.cursor[mode]=nextUndone(mode,(cur+1)%SENTENCES.length);saveState();renderPractice();setTimeout(startAudioLoop,120)
}
function restartMode(){if(!confirm('이 학습의 완료 기록을 지우고 처음부터 다시 풀까요?'))return;if(practiceMode==='arrange')state.arrangeDone=[];else state.typeDone=[];state.cursor[practiceMode]=0;saveState();renderPractice();startAudioLoop()}

function renderReview(){
  reviewChecking=false;const box=document.getElementById('review-box');updateWrongBadge();
  if(!state.wrongIds.length){box.innerHTML=`<div class="review-empty card"><div class="big">✅</div><h3>남은 오답이 없습니다.</h3><p>틀린 문장을 모두 다시 통과했습니다.</p></div>`;return}
  const id=state.wrongIds[0],s=SENTENCES[id];box.innerHTML=`<div class="progress-card"><div class="progress-top"><span class="stage">남은 오답</span><span class="progress-num">${state.wrongIds.length}문장</span></div><div class="bar"><div style="width:${Math.max(4,100-state.wrongIds.length/SENTENCES.length*100)}%"></div></div></div><div class="practice-card"><div class="section-chip">${escapeHtml(s.section)} · ${id+1}번</div><div class="meaning">${escapeHtml(s.ko)}</div><div class="instruction">영작과 같은 방식으로 다시 배열하세요. 음성은 반복 재생되며, 맞혀야 오답 목록에서 제거됩니다.</div><div id="review-answer" class="answer-area"></div><div id="review-bank" class="bank"></div><div id="review-feedback" class="feedback"></div><div class="audio-row"><button class="audio-btn play" onclick="toggleAudio()">▶ <span class="play-label">${loopOn?'일시정지':'반복 듣기'}</span></button><button class="audio-btn speed" onclick="toggleSpeed()">🐢 <span class="speed-label">${SPEED_LABELS[speedIndex]}</span></button></div><div class="action-row single"><button class="action check" onclick="checkReview()">오답 채점</button></div></div>`;
  const bank=document.getElementById('review-bank'),ans=document.getElementById('review-answer');shuffle(tokenize(s.en)).forEach(w=>{const b=document.createElement('button');b.type='button';b.className='chip';b.textContent=w;b.onclick=()=>{(b.parentElement===bank?ans:bank).appendChild(b);if(bank.children.length===0)setTimeout(checkReview,80)};bank.appendChild(b)});
  if(reviewSortable)try{reviewSortable.destroy()}catch(e){}if(window.Sortable)reviewSortable=new Sortable(ans,{animation:160,onEnd:()=>{if(bank.children.length===0)setTimeout(checkReview,80)}});updateAudioButtons()
}
function reviewFeedback(msg,type){const el=document.getElementById('review-feedback');if(el){el.textContent=msg;el.className='feedback'+(type?' '+type:'')}}
function checkReview(){if(reviewChecking||!state.wrongIds.length)return;const bank=document.getElementById('review-bank'),ans=document.getElementById('review-answer');if(bank.children.length){reviewFeedback('모든 단어를 답안 칸으로 옮겨 주세요.','ng');return}const id=state.wrongIds[0],s=SENTENCES[id],text=[...ans.children].map(x=>x.textContent).join(' '),ok=normalize(text)===normalize(s.en);if(ok){reviewChecking=true;ans.classList.add('ok');reviewFeedback('오답 통과! 목록에서 제거합니다.','ok');recordAttempt(true,id,true);successEffect('오답 통과!');stopAudio();setTimeout(()=>{renderReview();if(state.wrongIds.length)startAudioLoop();renderRecord()},900)}else{ans.classList.add('ng');setTimeout(()=>ans.classList.remove('ng'),350);reviewFeedback('아직 순서가 맞지 않습니다. 다시 해 보세요.','ng');recordAttempt(false,id);errorSound()}}

function startWordQuiz(){wordOrder=shuffle(WORDS.map((_,i)=>i));wordIndex=0;wordCorrect=0;wordBusy=false;document.getElementById('word-intro').style.display='none';document.getElementById('word-result').style.display='none';document.getElementById('word-quiz').style.display='block';renderWordQuestion()}
function renderWordQuestion(){wordBusy=false;if(wordIndex>=wordOrder.length){finishWordQuiz();return}const q=WORDS[wordOrder[wordIndex]];document.getElementById('word-status').textContent=`${wordIndex+1} / ${WORDS.length}`;document.getElementById('word-bar').style.width=`${Math.round(wordIndex/WORDS.length*100)}%`;document.getElementById('word-q').textContent=q.en;speak(q.en);const wrongs=shuffle(WORDS.filter(x=>x.en!==q.en)).slice(0,3);const opts=shuffle([{...q,ok:true},...wrongs.map(x=>({...x,ok:false}))]);const box=document.getElementById('word-options');box.innerHTML='';opts.forEach((o,i)=>{const b=document.createElement('button');b.className='option';b.textContent=`${i+1}. ${o.ko}`;b.onclick=()=>answerWord(b,o.ok,q,box);box.appendChild(b)})}
function answerWord(btn,ok,q,box){if(wordBusy)return;wordBusy=true;if(ok){btn.classList.add('correct');wordCorrect++;uniquePush(state.wordDone,q.en);saveState();successEffect('단어 정답!')}else{btn.classList.add('wrong');[...box.children].forEach(x=>{if(x.textContent.includes(q.ko))x.classList.add('correct')});errorSound()}setTimeout(()=>{wordIndex++;renderWordQuestion()},600)}
function finishWordQuiz(){document.getElementById('word-quiz').style.display='none';document.getElementById('word-result').style.display='block';document.getElementById('word-result-text').innerHTML=`이번 점수 <b>${wordCorrect}/${WORDS.length}</b><br>누적 학습 단어 <b>${state.wordDone.length}/${WORDS.length}</b>`;successEffect('단어 완료!');renderRecord()}

function renderRecord(){
  const box=document.getElementById('record-box');if(!box)return;const a=state.arrangeDone.length,t=state.typeDone.length,w=state.wrongIds.length,wd=state.wordDone.length;const pass=a===SENTENCES.length&&t===SENTENCES.length&&w===0;const status=pass?'PASS':'학습 중';const summary=`배열 영작 ${a}/${SENTENCES.length} | Dictation ${t}/${SENTENCES.length} | 오답 ${w} | ${status}`;
  let html=`<div class="pass-box ${pass?'pass':''}"><div class="pass-mark">${pass?'PASS':'IN PROGRESS'}</div><div class="pass-sub">${pass?'영작·Dictation 및 오답 복습 완료':'두 학습을 모두 끝내고 오답을 통과하면 PASS'}</div></div><div class="summary-grid"><div class="summary-card good"><div class="summary-label">배열 영작</div><div class="summary-value">${a}/${SENTENCES.length}</div></div><div class="summary-card good"><div class="summary-label">직접 Dictation</div><div class="summary-value">${t}/${SENTENCES.length}</div></div><div class="summary-card ${w?'bad':'good'}"><div class="summary-label">남은 오답</div><div class="summary-value">${w}</div></div><div class="summary-card"><div class="summary-label">핵심 단어</div><div class="summary-value">${wd}/${WORDS.length}</div></div></div><div class="copy-box"><div class="copy-title">검사용 한 줄 요약</div><div id="copy-summary" class="copy-text">${summary}</div><button class="copy-btn" onclick="copySummary()">요약 복사</button></div><div class="card"><b>오늘 학습</b><div style="margin-top:8px;color:var(--muted);font-weight:900;line-height:1.7">시도 ${state.today.attempts}회 · 정답 ${state.today.correct}회 · 오답 ${state.today.wrong}회<br>오답 복습 통과 누적 ${state.reviewPassed}문장</div></div>`;
  SECTIONS.forEach(sec=>{const ids=SENTENCES.filter(x=>x.section===sec).map(x=>x.id),ad=ids.filter(id=>state.arrangeDone.includes(id)).length,td=ids.filter(id=>state.typeDone.includes(id)).length,ww=ids.filter(id=>state.wrongIds.includes(id)).length,total=ids.length;const p=Math.round((ad+td)/(total*2)*100);html+=`<div class="section-progress"><div class="sp-head"><span>${escapeHtml(sec)}</span><span>${p}%</span></div><div class="sp-detail">영작 ${ad}/${total} · Dictation ${td}/${total} · 오답 ${ww}</div><div class="bar" style="margin-top:8px"><div style="width:${p}%"></div></div></div>`});
  html+=`<button class="danger" onclick="resetAllRecords()">전체 기록 초기화</button>`;box.innerHTML=html
}
function copySummary(){const text=document.getElementById('copy-summary').textContent;if(navigator.clipboard)navigator.clipboard.writeText(text).then(()=>showToast('요약을 복사했습니다.'));else{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();showToast('요약을 복사했습니다.')}}
function resetAllRecords(){if(!confirm('단어·영작·Dictation·오답 기록을 모두 초기화할까요?'))return;try{localStorage.removeItem(STORE_KEY)}catch(e){memoryStore=null}state=defaultState();practiceMode='arrange';saveState();renderRecord();updateWrongBadge();showToast('기록을 초기화했습니다.')}

function initAudioContext(){if(!audioCtx&&(window.AudioContext||window.webkitAudioContext))audioCtx=new (window.AudioContext||window.webkitAudioContext)();if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume()}
function tone(freq,dur,type='sine'){initAudioContext();if(!audioCtx)return;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=type;o.frequency.value=freq;g.gain.value=.07;g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+dur)}
function successSound(){tone(620,.12);setTimeout(()=>tone(840,.17),100)}function errorSound(){tone(240,.2,'sawtooth')}
function showToast(text){const el=document.getElementById('toast');el.textContent=text;el.classList.remove('show');void el.offsetWidth;el.classList.add('show')}
function confettiBurst(){const colors=['#ffbd3d','#2959a8','#6f5bd3','#1f9d67','#ef6b72'];for(let i=0;i<34;i++){const p=document.createElement('i');p.className='confetti';p.style.left=(48+Math.random()*4)+'vw';p.style.top=(42+Math.random()*4)+'vh';p.style.background=colors[i%colors.length];p.style.setProperty('--x',(Math.random()*320-160)+'px');p.style.setProperty('--y',(100+Math.random()*260)+'px');p.style.animationDelay=(Math.random()*.08)+'s';document.body.appendChild(p);setTimeout(()=>p.remove(),1400)}}
function successEffect(text){successSound();showToast(text);confettiBurst()}

document.addEventListener('DOMContentLoaded',()=>{updateWrongBadge();renderRecord();setPracticeMode(practiceMode,true)});
document.addEventListener('pointerdown',initAudioContext,{once:true});
</script>
</body>
</html>
